


services:
  db:
    image: postgres:16
    container_name: people_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-people_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-people_password}
      POSTGRES_DB: ${POSTGRES_DB:-people_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: people_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    ports:
      - "5001:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001
    container_name: people_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:

